<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Santiago</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f4f5f7; color: #1a1a2e;
  padding: 16px; font-size: 14px; min-height: 100vh;
}

/* ── SETUP SCREEN ── */
.setup-overlay {
  position: fixed; inset: 0; background: #f4f5f7;
  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 20px;
}
.setup-card {
  background: #fff; border-radius: 16px; padding: 32px;
  max-width: 440px; width: 100%;
  box-shadow: 0 4px 24px rgba(0,0,0,.12);
}
.setup-card h2 { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
.setup-card p  { font-size: 12px; color: #6b7280; margin-bottom: 24px; line-height: 1.6; }
.setup-card label { display: block; font-size: 11px; font-weight: 700; color: #374151; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
.setup-card input {
  width: 100%; padding: 9px 12px; border-radius: 8px;
  border: 1.5px solid #e5e7eb; font-size: 12px; font-family: monospace;
  margin-bottom: 14px; outline: none; transition: border-color .15s;
}
.setup-card input:focus { border-color: #6366f1; }
.setup-btn {
  width: 100%; padding: 11px; background: #1a1a2e; color: #fff;
  border: none; border-radius: 8px; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: background .15s;
}
.setup-btn:hover { background: #6366f1; }
.setup-err { color: #dc2626; font-size: 11px; margin-top: 8px; display: none; }

/* ── HEADER ── */
.header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
.header h1 { font-size: 18px; font-weight: 800; }
.header-right { text-align: right; }
.sync-info { font-size: 10px; color: #9ca3af; line-height: 1.7; }
.btn-sm {
  font-size: 24px; font-weight: 700; padding: 10px 20px;
  border-radius: 20px; border: 2px solid #e5e7eb;
  background: #fff; color: #6b7280; cursor: pointer; margin-left: 8px;
}
.btn-sm:hover { border-color: #6366f1; color: #6366f1; }
.date-sub { font-size: 11px; color: #9ca3af; margin-top: 3px; text-transform: capitalize; }

/* ── STATS ── */
.stats { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.stat { background: #fff; border-radius: 10px; padding: 10px 14px; box-shadow: 0 1px 3px rgba(0,0,0,.06); flex: 1; min-width: 70px; text-align: center; }
.stat-val { font-size: 24px; font-weight: 800; color: #1a1a2e; line-height: 1; }
.stat-lbl { font-size: 9px; color: #9ca3af; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-top: 3px; }
.s-hoy    .stat-val { color: #d97706; }
.s-semana .stat-val { color: #0891b2; }
.s-crit   .stat-val { color: #dc2626; }
.s-venc   .stat-val { color: #7c3aed; }

/* ── SECTIONS ── */
.section { margin-bottom: 20px; }
.section-title {
  display: flex; align-items: center; gap: 7px;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; color: #6b7280;
  margin-bottom: 8px; padding-bottom: 6px;
  border-bottom: 1.5px solid #e5e7eb;
}
.dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.badge { background: #e5e7eb; color: #6b7280; font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 20px; }

/* ── FILTERS ── */
.filter-bar { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.fbtn {
  font-size: 18px; font-weight: 600; padding: 10px 20px;
  border-radius: 20px; border: 2px solid #e5e7eb;
  background: #fff; color: #6b7280; cursor: pointer;
  display: flex; align-items: center; gap: 6px; transition: all .12s;
}
.fbtn:hover  { border-color: #6366f1; color: #6366f1; }
.fbtn.active { background: #6366f1; border-color: #6366f1; color: #fff; }
.fcat-dot { width: 6px; height: 6px; border-radius: 50%; }

/* ── TASK CARDS ── */
.tasks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 6px; }
.task-card {
  background: #fff; border-radius: 8px; padding: 10px 12px;
  border-left: 3px solid #e5e7eb; box-shadow: 0 1px 3px rgba(0,0,0,.05);
}
.p-critica { border-left-color: #ef4444; }
.p-alta    { border-left-color: #f97316; }
.p-media   { border-left-color: #eab308; }
.p-baja    { border-left-color: #22c55e; }
.is-hoy    { background: #fffbeb; }
.is-venc   { border-left-color: #7c3aed; }
.task-top  { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.task-desc { font-size: 12.5px; font-weight: 500; color: #111827; line-height: 1.45; }
.task-controls { display: flex; gap: 2px; flex-shrink: 0; }
.toggle-btn {
  background: none; border: none; font-size: 16px; line-height: 1;
  padding: 2px 3px; cursor: pointer; opacity: .45;
  transition: opacity .12s, transform .12s;
}
.toggle-btn:hover  { opacity: 1; transform: scale(1.18); }
.toggle-btn.active { opacity: 1; }
.task-meta { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.tag { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
.tag-cat    { background: #f3f4f6; color: #374151; }
.tag-status { background: #f3f4f6; color: #374151; }
.tag-venc   { background: #fff7ed; color: #c2410c; font-weight: 700; }
.tag-venc.urgent { background: #fef2f2; color: #dc2626; }
.tag-terc   { background: #eff6ff; color: #2563eb; }
.tag-id     { background: #f3f4f6; color: #9ca3af; font-size: 9px; }

/* ── CALENDAR ── */
.cal-day { margin-bottom: 12px; }
.cal-day-header { font-size: 10px; font-weight: 800; color: #6366f1; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
.cal-event { display: flex; align-items: center; gap: 10px; background: #fff; border-radius: 8px; padding: 8px 12px; margin-bottom: 4px; border-left: 3px solid #6366f1; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
.cal-time   { font-size: 11px; font-weight: 700; color: #6366f1; min-width: 46px; flex-shrink: 0; }
.cal-allday { font-size: 10px; color: #9ca3af; font-style: italic; min-width: 46px; flex-shrink: 0; }
.cal-title  { font-size: 12.5px; color: #111827; }

/* ── TABS ── */
.tab-bar {
  display: flex; gap: 4px; margin-bottom: 16px;
  background: #e5e7eb; border-radius: 10px; padding: 4px;
}
.tab-btn {
  flex: 1; padding: 9px 12px; border: none; border-radius: 7px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  background: transparent; color: #6b7280; transition: all .15s;
}
.tab-btn.active { background: #fff; color: #1a1a2e; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
.tab-btn:hover:not(.active) { color: #1a1a2e; }

/* ── CAJA STYLES ── */
.metrics-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; margin-bottom: 16px;
}
@media (max-width: 480px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } }
.metric-card { background: #fff; border-radius: 10px; border: 0.5px solid #e5e7eb; padding: 14px 16px; }
.metric-card .label { font-size: 11px; color: #888; margin-bottom: 6px; line-height: 1.4; }
.metric-card .value { font-size: 20px; font-weight: 600; line-height: 1.1; }
.metric-card .sub { font-size: 10px; color: #aaa; margin-top: 4px; }
.metric-card.placeholder { background: transparent; border: none; }
.value.red   { color: #b83232; }
.value.amber { color: #8a5000; }
.value.green { color: #2a6e2a; }
.caja-card { background: #fff; border-radius: 10px; border: 0.5px solid #e5e7eb; padding: 16px; margin-bottom: 16px; }
.caja-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.caja-table thead th { font-size: 11px; font-weight: 500; color: #999; text-align: right; padding: 0 0 8px; border-bottom: 0.5px solid #ebebeb; }
.caja-table thead th:first-child { text-align: left; }
.caja-table tbody tr { border-bottom: 0.5px solid #f0efeb; }
.caja-table tbody tr:last-child { border-bottom: none; }
.caja-table tbody td { padding: 7px 0; text-align: right; }
.caja-table tbody td:first-child { text-align: left; color: #444; }
.caja-table tfoot td { padding: 9px 0 0; font-weight: 600; text-align: right; border-top: 0.5px solid #d0cfcc; }
.caja-table tfoot td:first-child { text-align: left; }
.neg { color: #b83232; }
.muted { color: #bbb; }
.chart-wrap { position: relative; height: 200px; margin-top: 12px; }
.chart-wrap.tall { height: 280px; }
.caja-alerts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.alert { border-radius: 8px; padding: 10px 14px; font-size: 12px; line-height: 1.5; }
.alert.danger  { background: #fdf0f0; color: #9b2020; border: 0.5px solid #f5c6c6; }
.alert.warning { background: #fdf6e8; color: #7a4500; border: 0.5px solid #f0d898; }
.section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: #6b7280; margin: 0 0 10px; padding-bottom: 6px; border-bottom: 1.5px solid #e5e7eb; }
.caja-meta { font-size: 11px; color: #9ca3af; margin-bottom: 16px; }

/* ── STATES ── */
.empty   { color: #9ca3af; font-size: 12px; font-style: italic; padding: 6px 0; }
.loading { text-align: center; color: #9ca3af; padding: 50px 0; font-size: 13px; }
.err-box { background: #fef2f2; color: #dc2626; border-radius: 8px; padding: 12px; font-size: 12px; margin-bottom: 8px; }
</style>
</head>
<body>

<!-- Setup screen -->
<div class="setup-overlay" id="setup" style="display:none">
  <div class="setup-card">
    <h2>📊 Dashboard — Configuración</h2>
    <p>Primera vez o nueva configuración. Ingresá la URL y el token del Apps Script para conectar con tus tareas.</p>
    <label>URL del Apps Script</label>
    <input id="cfg-url" type="url" placeholder="https://script.google.com/macros/s/.../exec">
    <label>Token secreto</label>
    <input id="cfg-token" type="password" placeholder="Tu token">
    <button class="setup-btn" onclick="saveConfig()">Conectar</button>
    <div class="setup-err" id="cfg-err"></div>
  </div>
</div>

<!-- Main -->
<div id="main" style="display:none">
  <div class="header">
    <div>
      <h1>📊 Dashboard</h1>
      <div class="date-sub" id="date-line"></div>
    </div>
    <div class="header-right">
      <div class="sync-info" id="sync-info">Cargando...</div>
      <button class="btn-sm" onclick="refreshActive()" title="Actualizar">↻</button>
      <button class="btn-sm" onclick="showSetup()" title="Cambiar configuración">⚙</button>
    </div>
  </div>
  <!-- Tabs -->
  <div class="tab-bar">
    <button id="tab-pendientes" class="tab-btn active" onclick="switchTab('pendientes')">📋 Pendientes</button>
    <button id="tab-caja"       class="tab-btn"        onclick="switchTab('caja')">💰 Caja</button>
  </div>
  <!-- Pendientes view -->
  <div id="view-pendientes">
    <div id="app"><div class="loading">⏳ Cargando...</div></div>
  </div>
  <!-- Caja view -->
  <div id="view-caja" style="display:none">
    <div id="caja-app"><div class="loading">⏳ Cargando caja...</div></div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const CFG_KEY = 'pendientes_cfg';
const CAJA_JSON_URL = 'https://raw.githubusercontent.com/ssocas/Pendientes-dashboard/main/caja_dashboard.json';
let CFG = null;
let activeTab = 'pendientes';
let cajaLoaded = false;
let cajaCharts = {};

function loadConfig() {
  try { CFG = JSON.parse(localStorage.getItem(CFG_KEY)); } catch(e) { CFG = null; }
  return CFG && CFG.url && CFG.token;
}
function saveConfig() {
  const url   = document.getElementById('cfg-url').value.trim();
  const token = document.getElementById('cfg-token').value.trim();
  const err   = document.getElementById('cfg-err');
  if (!url || !token) { err.textContent = 'Completá ambos campos.'; err.style.display='block'; return; }
  CFG = { url, token };
  localStorage.setItem(CFG_KEY, JSON.stringify(CFG));
  err.style.display = 'none';
  document.getElementById('setup').style.display = 'none';
  document.getElementById('main').style.display  = 'block';
  loadData();
}
function showSetup() {
  if (CFG) {
    document.getElementById('cfg-url').value   = CFG.url;
    document.getElementById('cfg-token').value = CFG.token;
  }
  document.getElementById('main').style.display  = 'none';
  document.getElementById('setup').style.display = 'flex';
}

// ── TABS ──────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-pendientes').className = 'tab-btn' + (tab === 'pendientes' ? ' active' : '');
  document.getElementById('tab-caja').className       = 'tab-btn' + (tab === 'caja'       ? ' active' : '');
  document.getElementById('view-pendientes').style.display = tab === 'pendientes' ? 'block' : 'none';
  document.getElementById('view-caja').style.display       = tab === 'caja'       ? 'block' : 'none';
  if (tab === 'caja' && !cajaLoaded) loadCaja();
}
function refreshActive() {
  if (activeTab === 'pendientes') {
    loadData();
  } else {
    cajaLoaded = false;
    loadCaja();
  }
}

// ── INIT ──────────────────────────────────────────────────────
const CAT_COLORS = {
  'Estudio Trivelloni':      '#1565C0',
  'Conceptual Brasil':       '#00897B',
  'Inversiones Financieras': '#7B1FA2',
  'Inversiones Real Estate': '#1A237E',
  'Campo':                   '#558B2F',
  'Finanzas Personales':     '#F57F17',
  'Casa y Autos':            '#4E342E',
  'Otros':                   '#546E7A',
};
const CAT_ORDER = Object.keys(CAT_COLORS);

let ALL_TASKS = [], CAL_EVENTS = [], activeCat = 'Todas';

document.getElementById('date-line').textContent =
  new Date().toLocaleDateString('es-AR', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

// ── NORMALIZE ─────────────────────────────────────────────────
function normPrio(r) {
  if (!r) return '';
  if (r.includes('rítica') || r.includes('ritica')) return '🔴 Crítica';
  if (r.includes('Alta'))   return '🟠 Alta';
  if (r.includes('Media'))  return '🟡 Media';
  if (r.includes('Baja'))   return '🟢 Baja';
  return r;
}
function normStatus(r) {
  if (!r) return '';
  if (r.includes('Terminado'))   return '✅ Terminado';
  if (r.includes('Comenzado'))   return '🔄 Comenzado';
  if (r.includes('Seguimiento')) return '👁 Seguimiento';
  if (r.includes('Largo'))       return '📌 Largo Plazo';
  if (r.includes('Nuevo'))       return '🆕 Nuevo';
  return r;
}

// ── DATE UTILS ────────────────────────────────────────────────
function daysFrom(dateStr) {
  if (!dateStr) return null;
  const [y,m,d] = dateStr.slice(0,10).split('-').map(Number);
  const target = new Date(y, m-1, d);
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.round((target - now) / 864e5);
}
function labelDays(diff) {
  if (diff === null) return '';
  if (diff === 0)  return 'Hoy';
  if (diff === 1)  return 'Mañana';
  if (diff < 0)   return `Vencida hace ${Math.abs(diff)}d`;
  return `en ${diff}d`;
}
function dayLabel(dateStr) {
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt   = new Date(y, m-1, d);
  const now  = new Date(); now.setHours(0,0,0,0);
  const diff = Math.round((dt - now) / 864e5);
  if (diff === 0) return 'Hoy';
  if (diff === 1) return 'Mañana';
  return dt.toLocaleDateString('es-AR', {weekday:'long', day:'numeric', month:'short'});
}

// ── RENDER ────────────────────────────────────────────────────
function prioCls(p) {
  if (!p) return '';
  if (p.includes('rítica')) return 'p-critica';
  if (p.includes('Alta'))   return 'p-alta';
  if (p.includes('Media'))  return 'p-media';
  if (p.includes('Baja'))   return 'p-baja';
  return '';
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderTask(t, extra='', controls=[]) {
  const isHoy = t.hoy === '⭐';
  let vTag = '';
  if (t.venc) {
    const diff = daysFrom(t.venc);
    const urg  = diff !== null && diff <= 2;
    vTag = `<span class="tag tag-venc${urg?' urgent':''}" title="${esc(t.venc)}">⏰ ${labelDays(diff)}</span>`;
  }
  const cColor  = CAT_COLORS[t.cat] || '#666';
  const tercTag = t.tercero ? `<span class="tag tag-terc">👤 ${esc(t.tercero)}</span>` : '';

  let controlsHtml = '';
  if (controls.includes('star')) {
    const active = t.hoy === '⭐';
    controlsHtml += `<button class="toggle-btn${active?' active':''}" onclick="event.stopPropagation();toggleHoy(${t.id})" title="${active?'Quitar de Hoy':'Marcar para Hoy'}">${active?'⭐':'☆'}</button>`;
  }
  if (controls.includes('bookmark')) {
    const active = t.semana === '✅';
    controlsHtml += `<button class="toggle-btn${active?' active':''}" onclick="event.stopPropagation();toggleSemana(${t.id})" title="${active?'Quitar del radar semanal':'Agregar al radar semanal'}">${active?'🔖':'📑'}</button>`;
  }
  const controlsBlock = controlsHtml ? `<div class="task-controls">${controlsHtml}</div>` : '';

  return `<div class="task-card ${prioCls(t.prio)}${isHoy?' is-hoy':''}${extra}">
    <div class="task-top">
      <div class="task-desc">${esc(t.desc)}</div>
      ${controlsBlock}
    </div>
    <div class="task-meta">
      <span class="tag tag-cat" style="border-left:2px solid ${cColor}">${esc(t.cat)}</span>
      <span class="tag tag-status">${esc(normStatus(t.status))}</span>
      ${vTag}${tercTag}
      <span class="tag tag-id">#${t.id}</span>
    </div>
  </div>`;
}

function renderCalendar(events) {
  if (!events || !events.length) return '<div class="empty">Sin eventos en los próximos 7 días.</div>';
  const byDate = {};
  events.forEach(e => { (byDate[e.date] = byDate[e.date]||[]).push(e); });
  return Object.keys(byDate).sort().map(date => {
    const evs = byDate[date].map(e =>
      `<div class="cal-event">
        ${e.time ? `<span class="cal-time">🕐 ${e.time}</span>` : `<span class="cal-allday">Todo el día</span>`}
        <span class="cal-title">${esc(e.title)}</span>
      </div>`).join('');
    return `<div class="cal-day">
      <div class="cal-day-header">📅 ${dayLabel(date)}</div>${evs}
    </div>`;
  }).join('');
}

function buildFilterBar(tasks) {
  const used = CAT_ORDER.filter(c => tasks.some(t => t.cat === c));
  return ['Todas', ...used].map(c => {
    const cnt = c === 'Todas' ? tasks.length : tasks.filter(t => t.cat === c).length;
    const col = c === 'Todas' ? '#6366f1' : (CAT_COLORS[c]||'#666');
    const dot = c === 'Todas' ? '' : `<span class="fcat-dot" style="background:${col}"></span>`;
    return `<button class="fbtn${c===activeCat?' active':''}" onclick="setFilter('${esc(c)}')">${dot}${esc(c)} (${cnt})</button>`;
  }).join('');
}

function setFilter(cat) { activeCat = cat; renderAll(); }

function renderAll() {
  const tasks   = ALL_TASKS;
  const hoy     = tasks.filter(t => t.hoy === '⭐');
  const semana  = tasks.filter(t => t.semana === '✅');
  // El radar de la semana muestra las marcadas "semana" que no estén YA
  // en "hoy", para no duplicar la tarjeta en las dos secciones.
  const semanaOnly = semana.filter(t => t.hoy !== '⭐');
  const restoVenc  = tasks.filter(t => t.hoy !== '⭐');
  const vencen     = restoVenc.filter(t => { const d=daysFrom(t.venc); return d!==null && d>=0 && d<=7; });
  const criticos   = tasks.filter(t => (t.prio||'').includes('rítica')).length;
  const priOrd = {'🔴 Crítica':1,'🟠 Alta':2,'🟡 Media':3,'🟢 Baja':4};
  const filtered = (activeCat==='Todas' ? tasks : tasks.filter(t=>t.cat===activeCat))
    .sort((a,b) => {
      const ci = CAT_ORDER.indexOf(a.cat) - CAT_ORDER.indexOf(b.cat);
      return ci !== 0 ? ci : (priOrd[normPrio(a.prio)]||9)-(priOrd[normPrio(b.prio)]||9);
    });

  let html = `<div class="stats">
    <div class="stat"><div class="stat-val">${tasks.length}</div><div class="stat-lbl">Total activos</div></div>
    <div class="stat s-hoy"><div class="stat-val">${hoy.length}</div><div class="stat-lbl">⭐ Hoy</div></div>
    <div class="stat s-semana"><div class="stat-val">${semana.length}</div><div class="stat-lbl">🔖 Semana</div></div>
    <div class="stat s-crit"><div class="stat-val">${criticos}</div><div class="stat-lbl">🔴 Críticos</div></div>
    <div class="stat s-venc"><div class="stat-val">${vencen.length}</div><div class="stat-lbl">⏰ 7 días</div></div>
  </div>`;

  html += `<div class="section">
    <div class="section-title"><span class="dot" style="background:#d97706"></span>Tareas de hoy<span class="badge">${hoy.length}</span></div>
    ${hoy.length ? hoy.map(t=>renderTask(t,'',['star','bookmark'])).join('') : '<div class="empty">Sin tareas marcadas para hoy. Usá ⭐ en el radar de la semana para agregar.</div>'}
  </div>`;

  html += `<div class="section">
    <div class="section-title"><span class="dot" style="background:#22c55e"></span>Radar de la semana<span class="badge">${semanaOnly.length}</span></div>
    ${semanaOnly.length ? semanaOnly.map(t=>renderTask(t,'',['star','bookmark'])).join('') : '<div class="empty">Sin tareas en el radar semanal (fuera de las ya marcadas para hoy).</div>'}
  </div>`;

  html += `<div class="section">
    <div class="section-title"><span class="dot" style="background:#7c3aed"></span>Vencen en los próximos 7 días<span class="badge">${vencen.length}</span></div>
    ${vencen.length ? vencen.map(t=>renderTask(t,' is-venc')).join('') : '<div class="empty">Sin vencimientos próximos.</div>'}
  </div>`;

  html += `<div class="section">
    <div class="section-title"><span class="dot" style="background:#6366f1"></span>Agenda próximos 7 días<span class="badge">${CAL_EVENTS.length}</span></div>
    ${renderCalendar(CAL_EVENTS)}
  </div>`;

  html += `<div class="section">
    <div class="section-title"><span class="dot" style="background:#9ca3af"></span>Todos los pendientes<span class="badge">${filtered.length}</span></div>
    <div class="filter-bar">${buildFilterBar(tasks)}</div>
    <div class="tasks-grid">${filtered.length ? filtered.map(t=>renderTask(t,'',['bookmark'])).join('') : '<div class="empty">Sin tareas en esta categoría.</div>'}</div>
  </div>`;

  document.getElementById('app').innerHTML = html;
}

// ── ESCRITURA (toggles Hoy / Semana desde el dashboard) ─────────
// Excepción autorizada por Santiago: estos dos toggles escriben directo
// al Sheet sin pasar por el flujo de borrador/confirmación habitual,
// porque son acciones reversibles de un click sobre datos que el propio
// dashboard ya muestra (no hay riesgo de ejecutar algo no visto).
//
// Content-Type "text/plain" (en vez de "application/json") evita el
// preflight CORS que Apps Script Web Apps no maneja por default; el
// body sigue siendo JSON y Apps Script lo lee igual vía e.postData.contents.
async function postChange(id, fields) {
  const { url, token } = CFG;
  const payload = { token, action: 'apply_changes', changes: [{ op: 'update', id, fields }] };
  try {
    const res  = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return true;
  } catch (err) {
    alert('No se pudo guardar el cambio: ' + err.message);
    return false;
  }
}

function toggleHoy(id) {
  const t = ALL_TASKS.find(x => x.id === id);
  if (!t) return;
  if (t.hoy !== '⭐' && t.semana !== '✅') {
    alert('Esta tarea no está en el radar de la semana. Agregala primero con 📑 antes de marcarla para hoy.');
    return;
  }
  const prevHoy = t.hoy;
  const newVal  = prevHoy === '⭐' ? '☆' : '⭐';
  t.hoy = newVal; // optimista
  renderAll();
  postChange(id, { hoy: newVal }).then(ok => {
    if (!ok) { t.hoy = prevHoy; renderAll(); }
  });
}

function toggleSemana(id) {
  const t = ALL_TASKS.find(x => x.id === id);
  if (!t) return;
  const prevSemana = t.semana, prevHoy = t.hoy;
  const newVal = prevSemana === '✅' ? '—' : '✅';
  t.semana = newVal;
  // Regla de consistencia (mismo criterio que el Apps Script): si sale
  // del radar semanal, sale también de hoy.
  if (newVal !== '✅') t.hoy = '☆';
  renderAll();
  postChange(id, { semana: newVal }).then(ok => {
    if (!ok) { t.semana = prevSemana; t.hoy = prevHoy; renderAll(); }
  });
}

// ── LOAD ──────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('app').innerHTML = '<div class="loading">⏳ Cargando...</div>';
  const { url, token } = CFG;
  try {
    const res  = await fetch(`${url}?token=${encodeURIComponent(token)}&action=get_all`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    ALL_TASKS  = (data.tasks    || []).map(t => ({ ...t, prio: normPrio(t.prio) }));
    CAL_EVENTS = data.calendar  || [];
    document.getElementById('sync-info').textContent =
      `Actualizado: ${new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})} · ${ALL_TASKS.length} tareas · ${CAL_EVENTS.length} eventos`;
    renderAll();
  } catch(err) {
    document.getElementById('app').innerHTML =
      `<div class="err-box">❌ ${esc(err.message)}<br><small>Verificá la URL y el token en ⚙</small></div>`;
    document.getElementById('sync-info').textContent = 'Error al cargar';
  }
}

// ════════════════════════════════════════════════════════════════
// CAJA
// ════════════════════════════════════════════════════════════════
function fmt(n, dec=0) {
  if (n===null || n===undefined || isNaN(n)) return null;
  return new Intl.NumberFormat('en-US', {minimumFractionDigits:dec, maximumFractionDigits:dec}).format(n);
}
function fmtARS(n) {
  if (n===null || n===undefined) return '<span class="muted">-</span>';
  return '$' + fmt(Math.round(n));
}
function fmtUSD(n) {
  if (n===null || n===undefined) return '<span class="muted">-</span>';
  const abs = Math.abs(n);
  const s = 'USD ' + fmt(abs);
  return n < 0 ? `<span class="neg">(${s})</span>` : s;
}
function metricCard(label, valueHtml, sub='', extraClass='') {
  return `<div class="metric-card">
    <div class="label">${label}</div>
    <div class="value ${extraClass}">${valueHtml}</div>
    ${sub ? `<div class="sub">${sub}</div>` : ''}
  </div>`;
}
function destroyCajaCharts() {
  Object.values(cajaCharts).forEach(c => { try { c.destroy(); } catch(e) {} });
  cajaCharts = {};
}
async function loadCaja() {
  destroyCajaCharts();
  document.getElementById('caja-app').innerHTML = '<div class="loading">⏳ Cargando caja...</div>';
  try {
    const res = await fetch(CAJA_JSON_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const d = await res.json();
    cajaLoaded = true;
    renderCaja(d);
  } catch(err) {
    document.getElementById('caja-app').innerHTML =
      `<div class="err-box">❌ No se pudo cargar caja_dashboard.json<br><small>${esc(err.message)}</small></div>`;
  }
}
function renderCaja(d) {
  const saldoARS   = d.saldo_ars;
  const semanal    = d.promedio_semanal;
  const saldoUSD   = d.saldo_usd;
  const consumoUSD = d.promedio_consumo_usd;
  const compraUSD  = d.promedio_compraventa_usd;
  const invUSD     = d.promedio_inversiones_usd;
  const billeteras = (d.caja_usd || []).filter(r => r.nombre);
  const ctas       = (d.ctas_ctes_usd || []).filter(r => r.nombre);
  // ── Runway ARS ──
  let runwayARS = null, arsClass = '';
  if (saldoARS && semanal && semanal > 0) {
    runwayARS = Math.round((saldoARS / semanal) * 7);
    arsClass  = runwayARS < 7 ? 'red' : runwayARS < 14 ? 'amber' : 'green';
  }
  // ── Runway USD ──
  let runwayUSD = null, usdClass = '';
  if (saldoUSD && consumoUSD && consumoUSD < 0) {
    runwayUSD = Math.round((saldoUSD / Math.abs(consumoUSD)) * 10) / 10;
    usdClass  = runwayUSD < 1 ? 'red' : runwayUSD < 3 ? 'amber' : 'green';
  }
  let html = '';
  // Meta
  html += `<div class="caja-meta">Generado: ${d.generado || '-'}${d.actualizado_al ? ' · Datos al: ' + d.actualizado_al : ''}</div>`;
  // ── ARS alerts ──
  let alerts = '';
  if (runwayARS !== null && runwayARS < 7)  alerts += `<div class="alert danger"><strong>Caja ARS crítica:</strong> saldo cubre ~${runwayARS} días.</div>`;
  else if (runwayARS !== null && runwayARS < 14) alerts += `<div class="alert warning"><strong>Caja ARS baja:</strong> saldo cubre ~${runwayARS} días.</div>`;
  // ── ARS metrics ──
  html += `<div class="section-label">Caja ARS</div>`;
  html += `<div class="metrics-grid">
    ${metricCard('Saldo actual', saldoARS !== null ? fmtARS(saldoARS) : '-', '', arsClass ? arsClass : '')}
    ${metricCard('Gasto semanal prom. (90d)', semanal !== null ? fmtARS(semanal) : '-')}
    ${metricCard('Runway estimado', runwayARS !== null ? runwayARS + ' días' : '-', 'al ritmo actual', arsClass)}
  </div>`;
  if (alerts) html += `<div class="caja-alerts">${alerts}</div>`;
  // ── USD alerts ──
  let usdAlerts = '';
  if (runwayUSD !== null && runwayUSD < 1)  usdAlerts += `<div class="alert danger"><strong>Caja USD crítica:</strong> runway ~${runwayUSD} meses.</div>`;
  else if (runwayUSD !== null && runwayUSD < 3) usdAlerts += `<div class="alert warning"><strong>Caja USD baja:</strong> runway ~${runwayUSD} meses.</div>`;
  // ── USD metrics ──
  html += `<div class="section-label">Caja USD</div>`;
  html += `<div class="metrics-grid">
    ${metricCard('Saldo actual', saldoUSD !== null ? fmtUSD(saldoUSD) : '-')}
    ${metricCard('Consumo mensual prom. (90d)', consumoUSD !== null ? fmtUSD(consumoUSD) : '-')}
    ${metricCard('Runway estimado', runwayUSD !== null ? runwayUSD + ' meses' : '-', 'al ritmo actual', usdClass)}
    ${metricCard('Compraventa mensual prom. (90d)', compraUSD !== null ? fmtUSD(compraUSD) : '-')}
    ${metricCard('Inversiones mensual prom. (90d)', invUSD !== null ? fmtUSD(invUSD) : '-')}
    <div class="metric-card placeholder"></div>
  </div>`;
  if (usdAlerts) html += `<div class="caja-alerts">${usdAlerts}</div>`;
  // ── Billeteras USD ──
  if (billeteras.length > 0) {
    const rows = billeteras.map(r =>
      `<tr><td>${esc(r.nombre)}</td><td>${fmtUSD(r.cash)}</td><td>${fmtUSD(r.caja_seg)}</td><td>${fmtUSD(r.total)}</td></tr>`
    ).join('');
    const tfoot = d.total_usd !== null
      ? `<tfoot><tr><td>Total USD neto</td><td></td><td></td><td>${fmtUSD(d.total_usd)}</td></tr></tfoot>` : '';
    html += `<div class="section-label">Caja USD — Billeteras</div>
    <div class="caja-card">
      <table class="caja-table">
        <thead><tr><th>Billetera</th><th>Cash</th><th>Caja seg.</th><th>Total</th></tr></thead>
        <tbody>${rows}</tbody>${tfoot}
      </table>
      <div class="chart-wrap"><canvas id="chartBilleteras"></canvas></div>
    </div>`;
  }
  // ── Cuentas corrientes ──
  if (ctas.length > 0) {
    const ctaRows = ctas.map(r => {
      const neg = r.saldo < 0;
      return `<tr><td>${esc(r.nombre)}</td><td class="${neg?'neg':''}">${fmtUSD(r.saldo)}</td></tr>`;
    }).join('');
    const ctaFoot = d.total_ctas_ctes_usd !== null
      ? `<tfoot><tr><td>Total</td><td class="${d.total_ctas_ctes_usd<0?'neg':''}">${fmtUSD(d.total_ctas_ctes_usd)}</td></tr></tfoot>` : '';
    html += `<div class="section-label">Cuentas corrientes terceros USD</div>
    <div class="caja-card">
      <table class="caja-table">
        <thead><tr><th>Contraparte</th><th>Saldo (USD)</th></tr></thead>
        <tbody>${ctaRows}</tbody>${ctaFoot}
      </table>
      <p style="font-size:11px;color:#bbb;margin-top:10px;">Negativo = presté dinero</p>
    </div>`;
  }
  // ── Egresos ARS ──
  if (d.chart_egresos && d.chart_egresos.meses && d.chart_egresos.meses.length > 0) {
    html += `<div class="section-label">Egresos ARS por categoría — últimos 12 meses</div>
    <div class="caja-card"><div class="chart-wrap tall"><canvas id="chartEgresos"></canvas></div></div>`;
  }
  // ── USD Ops ──
  if (d.chart_usd_ops && d.chart_usd_ops.meses && d.chart_usd_ops.meses.length > 0) {
    html += `<div class="section-label">Compras, ventas e inversiones USD — últimos 12 meses</div>
    <div class="caja-card"><div class="chart-wrap tall"><canvas id="chartUSDOps"></canvas></div></div>`;
  }
  document.getElementById('caja-app').innerHTML = html;
  // ── Render charts ──
  const CLRS = ['#4e79a7','#f28e2b','#e15759','#76b7b2','#59a14f','#b07aa1'];
  if (billeteras.length > 0) {
    cajaCharts.billeteras = new Chart(document.getElementById('chartBilleteras'), {
      type: 'bar',
      data: {
        labels: billeteras.map(r => r.nombre),
        datasets: [{
          label: 'Total USD',
          data: billeteras.map(r => Math.round(r.total || 0)),
          backgroundColor: billeteras.map(r => (r.total||0) < 0 ? '#f5c6c6' : '#c6dff5'),
          borderColor:     billeteras.map(r => (r.total||0) < 0 ? '#b83232' : '#1860a8'),
          borderWidth: 1, borderRadius: 4
        }]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: '#f0efeb' }, ticks: { font: { size: 11 }, color: '#aaa' } },
          y: { grid: { display: false }, ticks: { font: { size: 12 }, color: '#555' } }
        }
      }
    });
  }
  if (d.chart_egresos && d.chart_egresos.meses.length > 0) {
    const ce = d.chart_egresos;
    cajaCharts.egresos = new Chart(document.getElementById('chartEgresos'), {
      type: 'bar',
      data: {
        labels: ce.meses,
        datasets: ce.categorias.map((cat, i) => ({
          label: cat, data: ce.datos[cat],
          backgroundColor: CLRS[i % CLRS.length], borderWidth: 0, borderRadius: 2
        }))
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 10 } },
          tooltip: { callbacks: { label: ctx => ' $' + fmt(ctx.raw) } }
        },
        scales: {
          x: { stacked: true, grid: { display: false }, ticks: { font: { size: 10 }, color: '#aaa' } },
          y: { stacked: true, grid: { color: '#f0efeb' }, ticks: { font: { size: 10 }, color: '#aaa', callback: v => '$' + fmt(v) } }
        }
      }
    });
  }
  if (d.chart_usd_ops && d.chart_usd_ops.meses.length > 0) {
    const cu = d.chart_usd_ops;
    cajaCharts.usdOps = new Chart(document.getElementById('chartUSDOps'), {
      type: 'bar',
      data: {
        labels: cu.meses,
        datasets: [
          { label: 'Compra USD',      data: cu.compra,      backgroundColor: '#4e79a7', borderWidth: 0, borderRadius: 2 },
          { label: 'Venta USD',       data: cu.venta,       backgroundColor: '#e15759', borderWidth: 0, borderRadius: 2 },
          { label: 'Inversiones SS',  data: cu.inversiones, backgroundColor: '#59a14f', borderWidth: 0, borderRadius: 2 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 10 } },
          tooltip: { callbacks: { label: ctx => ' $' + fmt(ctx.raw) } }
        },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#aaa' } },
          y: { grid: { color: '#f0efeb' }, ticks: { font: { size: 10 }, color: '#aaa', callback: v => '$' + fmt(v) } }
        }
      }
    });
  }
}

// ── STARTUP ───────────────────────────────────────────────────
if (loadConfig()) {
  document.getElementById('main').style.display  = 'block';
  loadData();
} else {
  document.getElementById('setup').style.display = 'flex';
}
